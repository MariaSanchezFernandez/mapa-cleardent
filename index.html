<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encuentra tu clínica Cleardent más cercana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --cd-primary: #007BFF;
    --cd-primary-hover: #2563EB;
    --cd-primary-active: #1D4ED8;
    --cd-secondary: #003471;
    --cd-shadow-pin: #5AABFF;
    --cd-bg: #F9FAFB;
    --cd-surface: #F4F6F8;
    --cd-border: #E5E7EB;
    --cd-text: #374151;
    --cd-text-light: #6B7280;
    --cd-muted: #6B7280;
    --cd-shadow-card: 0 16px 35px 0 rgba(47,98,217,0.28);
    --cd-shadow-card-hover: 0 16px 35px 0 rgba(10,20,100,0.4);
    --cd-radius-xl: 30px;
    --cd-radius-pill: 9999px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--cd-text);
    background: var(--cd-bg);
  }
  .cd-wrap {
    max-width: 1240px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }
  .cd-header {
    text-align: center;
    margin-bottom: 20px;
  }
  .cd-header h1 {
    font-size: 25px;
    font-weight: 700;
    color: var(--cd-primary);
    margin: 0 0 6px;
  }
  .cd-header p {
    margin: 0;
    color: var(--cd-muted);
    font-size: 15px;
  }
  .cleardent-search-widget {
    position: relative;
    max-width: 440px;
    margin: 18px auto 0;
  }
  .cleardent-search {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #fff;
    border: 1px solid var(--cd-border);
    border-radius: var(--cd-radius-pill);
    padding: 12px 18px;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .cleardent-search:focus-within {
    border-color: var(--cd-primary);
    box-shadow: 0 0 0 3px rgba(0,123,255,0.15);
  }
  .cleardent-search .search-icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    color: var(--cd-text-light);
  }
  .cleardent-search input {
    flex: 1;
    min-width: 0;
    border: none;
    outline: none;
    background: none;
    font-family: inherit;
    font-size: 15px;
    color: var(--cd-text);
  }
  .cleardent-search input::placeholder {
    color: var(--cd-text-light);
  }
  .cleardent-search-results {
    position: absolute;
    left: 0;
    right: 0;
    top: calc(100% + 8px);
    background: #fff;
    border: 1px solid var(--cd-border);
    border-radius: 16px;
    box-shadow: var(--cd-shadow-card-hover);
    max-height: 320px;
    overflow-y: auto;
    z-index: 20;
    padding: 6px;
  }
  .cleardent-search-result {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .cleardent-search-result:hover {
    background: var(--cd-surface);
  }
  .cleardent-search-result-name {
    font-weight: 600;
    font-size: 13.5px;
    color: var(--cd-secondary);
  }
  .cleardent-search-result-addr {
    font-size: 12px;
    color: var(--cd-text-light);
    margin-top: 1px;
  }
  .cleardent-search-empty {
    padding: 14px 12px;
    font-size: 13px;
    color: var(--cd-text-light);
    text-align: center;
    line-height: 1.6;
  }
  .cleardent-search-empty a {
    color: var(--cd-primary);
    font-weight: 700;
    text-decoration: none;
  }
  .cleardent-search-empty a:hover { text-decoration: underline; }

  .cd-layout {
    display: flex;
    gap: 20px;
    margin-top: 22px;
    align-items: center;
    justify-content: center;
  }

  /* ── Carrusel ── */
  .cd-carousel-wrap {
    width: 380px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .cd-carousel {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
  }
  .cd-car-viewport {
    flex: 1;
    min-width: 0;
    border-radius: var(--cd-radius-xl);
  }
  .cd-car-card {
    display: flex;
    flex-direction: column;
    gap: 14px;
    height: 480px;
    padding: 24px;
    border-radius: var(--cd-radius-xl);
    background: #fff;
    box-shadow: var(--cd-shadow-card);
    transition: opacity 0.18s ease, transform 0.18s ease, box-shadow 0.2s ease;
  }
  .cd-car-card[hidden] {
    display: none !important;
  }
  .cd-car-card:hover {
    box-shadow: var(--cd-shadow-card-hover);
  }
  .cd-car-card.cd-car-fade {
    opacity: 0;
    transform: translateY(6px);
  }
  .cd-car-head {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 8px;
  }
  .cd-car-badge {
    align-self: center;
    background: rgba(0,123,255,0.1);
    color: var(--cd-primary);
    padding: 4px 12px;
    border-radius: var(--cd-radius-pill);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .cd-car-title {
    font-size: 24px;
    font-weight: 800;
    color: var(--cd-secondary);
    margin: 0;
    line-height: 1.15;
  }
  .cd-car-clinics {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
    border-top: 1px solid var(--cd-border);
    padding-top: 10px;
  }
  .cd-car-clinic-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid var(--cd-border);
  }
  .cd-car-clinic-row:last-child { border-bottom: none; }
  .cd-car-clinic-pin {
    flex-shrink: 0;
    margin-top: 2px;
    color: var(--cd-text-light);
  }
  .cd-car-clinic-name {
    font-weight: 700;
    font-size: 13.5px;
    color: var(--cd-secondary);
  }
  .cd-car-clinic-addr {
    font-size: 12.5px;
    color: var(--cd-text-light);
    line-height: 1.4;
    margin-top: 1px;
  }
  .cd-car-cta {
    align-self: center;
    text-align: center;
    background: var(--cd-primary);
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    padding: 12px 24px;
    border-radius: var(--cd-radius-pill);
    transition: background 0.2s ease;
  }
  .cd-car-cta:hover { background: var(--cd-primary-hover); }
  .cd-car-nav {
    flex-shrink: 0;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: #fff;
    border: 1px solid var(--cd-border);
    color: var(--cd-primary);
    font-size: 15px;
    cursor: pointer;
  }
  .cd-car-nav:hover { background: #EEF2FF; }
  .cd-car-dots {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin-top: 16px;
  }
  .cd-car-dot {
    width: 8px;
    height: 8px;
    padding: 0;
    border: none;
    border-radius: 4px;
    background: var(--cd-border);
    cursor: pointer;
    transition: width 0.15s ease, background 0.15s ease;
  }
  .cd-car-dot.active {
    width: 22px;
    background: var(--cd-primary);
  }

  /* ── Mapa ── */
  .cd-map-outer {
    position: relative;
    flex: 1 1 620px;
    max-width: 620px;
    min-width: 0;
  }
  .cd-spain-map svg {
    display: block;
    width: 100%;
    height: auto;
  }
  .province {
    stroke: var(--cd-primary);
    stroke-width: 0.8;
    stroke-linejoin: round;
    vector-effect: non-scaling-stroke;
    transition: fill 0.2s ease, opacity 0.2s ease;
  }
  .province.has-clinics { fill: rgba(0,123,255,0.10); }
  .province.dimmed { opacity: 0.25; }

  .prov-group { cursor: pointer; }
  .prov-group.dimmed { opacity: 0.25; }
  .pin-scale {
    transition: transform 0.15s ease;
    transform-box: fill-box;
    transform-origin: center bottom;
  }
  .prov-group:hover .pin-scale,
  .prov-group.cd-selected .pin-scale {
    transform: scale(1.25);
  }
  .prov-group:hover .pin-body,
  .prov-group.cd-selected .pin-body {
    fill: var(--cd-primary-active);
  }
  .pin-shadow { opacity: 0.65; pointer-events: none; }

  .cd-map-tip {
    position: absolute;
    pointer-events: none;
    z-index: 10;
    background: var(--cd-primary);
    color: #fff;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    box-shadow: 0 4px 14px rgba(0,123,255,0.3);
    opacity: 0;
    transition: opacity 0.12s ease;
    left: -9999px;
    top: -9999px;
  }
  .cd-map-tip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--cd-primary);
  }

  @media (max-width: 900px) {
    .cd-layout { flex-direction: column-reverse; }
    .cd-carousel-wrap { width: 100%; }
    .cd-map-outer { width: 100%; max-width: 100%; flex: 0 0 auto; }
    .cd-car-card { height: 440px; }
  }
</style>
</head>

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (m) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&#39;', "'": '&#39;' }[m];
    });
  }

  function normalizeText(s) {
    return String(s).normalize('NFD').replace(new RegExp('[̀-ͯ]', 'g'), '').toLowerCase();
  }

  var provincesMap = {};
  CLINICS.forEach(function (c) {
    if (!provincesMap[c.p]) provincesMap[c.p] = [];
    provincesMap[c.p].push(c);
  });
  var provinceNames = Object.keys(provincesMap).sort(function (a, b) { return a.localeCompare(b, 'es'); });

  document.getElementById('cdSubtitle').textContent =
    CLINICS.length + ' clínicas en ' + provinceNames.length + ' provincias de España';

  // ── Carrusel ──
  var carCardEl = document.getElementById('cdCarCard');
  var carBadgeEl = document.getElementById('cdCarBadge');
  var carTitleEl = document.getElementById('cdCarTitle');
  var carClinicsEl = document.getElementById('cdCarClinics');
  var carDotsEl = document.getElementById('cdCarDots');
  var carPrevBtn = document.getElementById('cdCarPrev');
  var carNextBtn = document.getElementById('cdCarNext');
  var carouselEl = document.getElementById('cdCarousel');

  var PIN_ICON_SVG = '<svg class="cd-car-clinic-pin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>';

  var currentIndex = 0;
  var autoplayTimer = null;
  var AUTOPLAY_MS = 4500;

  function clinicRowHtml(c) {
    return '<div class="cd-car-clinic-row">' + PIN_ICON_SVG +
      '<div><div class="cd-car-clinic-name">Cleardent ' + esc(c.n) + '</div>' +
      '<div class="cd-car-clinic-addr">' + esc(c.a) + ', ' + esc(c.c) + '</div></div></div>';
  }

  function renderClinicsList(clinics) {
    var html = '';
    clinics.forEach(function (c) { html += clinicRowHtml(c); });
    carClinicsEl.innerHTML = html;
  }

  function renderCarouselDots() {
    var html = '';
    provinceNames.forEach(function (name, i) {
      html += '<button class="cd-car-dot" type="button" data-index="' + i + '" aria-label="' + esc(name) + '"></button>';
    });
    carDotsEl.innerHTML = html;
    Array.prototype.forEach.call(carDotsEl.querySelectorAll('.cd-car-dot'), function (dot) {
      dot.addEventListener('click', function () {
        goToIndex(Number(dot.getAttribute('data-index')), true);
      });
    });
  }

  function renderCarouselCard() {
    var province = provinceNames[currentIndex];
    var clinics = provincesMap[province];
    carCardEl.classList.add('cd-car-fade');
    window.setTimeout(function () {
      carBadgeEl.textContent = clinics.length + (clinics.length === 1 ? ' clínica Cleardent' : ' clínicas Cleardent');
      carTitleEl.textContent = province;
      renderClinicsList(clinics);
      carClinicsEl.scrollTop = 0;
      carCardEl.classList.remove('cd-car-fade');
    }, 150);
    Array.prototype.forEach.call(carDotsEl.querySelectorAll('.cd-car-dot'), function (dot, i) {
      dot.classList.toggle('active', i === currentIndex);
    });
    setActiveProvince(province);
  }

  function goToIndex(i, manual) {
    currentIndex = ((i % provinceNames.length) + provinceNames.length) % provinceNames.length;
    renderCarouselCard();
    if (manual) restartAutoplay();
  }

  function startAutoplay() {
    stopAutoplay();
    autoplayTimer = window.setInterval(function () { goToIndex(currentIndex + 1, false); }, AUTOPLAY_MS);
  }
  function stopAutoplay() {
    if (autoplayTimer) { window.clearInterval(autoplayTimer); autoplayTimer = null; }
  }
  function restartAutoplay() {
    startAutoplay();
  }

  carPrevBtn.addEventListener('click', function () { goToIndex(currentIndex - 1, true); });
  carNextBtn.addEventListener('click', function () { goToIndex(currentIndex + 1, true); });
  carouselEl.addEventListener('mouseenter', stopAutoplay);
  carouselEl.addEventListener('mouseleave', startAutoplay);

  // ── Mapa SVG ──
  var provincesEl = document.getElementById('cdProvinces');
  var pinsEl = document.getElementById('cdPins');
  var tipEl = document.getElementById('cdMapTip');
  var tipTextEl = document.getElementById('cdMapTipText');
  var mapOuterEl = document.querySelector('.cd-map-outer');

  var SHADOW_MAX = 7;
  var SHADOW_R = 30;

  function renderProvincePaths() {
    var html = '';
    PROVINCE_PATHS.forEach(function (p) {
      var realName = normGeo(p.name);
      var hasClinics = !!provincesMap[realName];
      html += '<path d="' + p.d + '" class="province' + (hasClinics ? ' has-clinics' : '') + '" data-province="' + esc(realName) + '"><title>' + esc(realName) + '</title></path>';
    });
    provincesEl.innerHTML = html;
  }

  function renderPins() {
    var html = '';
    provinceNames.forEach(function (province) {
      var clinics = provincesMap[province];
      var n = clinics.length;
      var geo = GEO_CENTROID[province];
      var cx, cy;
      if (geo) {
        cx = geo.lon; cy = geo.lat;
      } else {
        cx = clinics.reduce(function (s, c) { return s + c.lng; }, 0) / n;
        cy = clinics.reduce(function (s, c) { return s + c.lat; }, 0) / n;
      }
      var pt = projectPoint(cx, cy);
      var shadowCount = Math.min(n - 1, SHADOW_MAX);

      html += '<g class="prov-group" data-province="' + esc(province) + '" data-count="' + n + '" transform="translate(' + pt.x + ',' + pt.y + ')">';
      html += '<title>' + esc(province) + ' · ' + n + (n > 1 ? ' clínicas' : ' clínica') + '</title>';

      for (var i = 0; i < shadowCount; i++) {
        var t = shadowCount === 1 ? 0.5 : i / (shadowCount - 1);
        var angle = (-150 + t * 120) * (Math.PI / 180);
        var sx = Math.round(Math.cos(angle) * SHADOW_R * 10) / 10;
        var sy = Math.round(Math.sin(angle) * SHADOW_R * 10) / 10;
        html += '<use href="#pin-shadow" class="pin-shadow" x="' + sx + '" y="' + sy + '" />';
      }

      html += '<g class="pin-scale"><use href="#pin-main" x="0" y="0" /></g>';
      html += '</g>';
    });
    pinsEl.innerHTML = html;

    Array.prototype.forEach.call(pinsEl.querySelectorAll('.prov-group'), function (g) {
      g.addEventListener('mouseenter', function () {
        showTip(g);
      });
      g.addEventListener('mouseleave', function () {
        hideTip();
      });
      g.addEventListener('click', function () {
        var idx = provinceNames.indexOf(g.getAttribute('data-province'));
        if (idx !== -1) goToIndex(idx, true);
      });
    });
  }

  function showTip(pinGroup) {
    if (!window.matchMedia('(hover: hover)').matches) return;
    var province = pinGroup.getAttribute('data-province');
    var count = pinGroup.getAttribute('data-count');
    tipTextEl.textContent = count + (count > 1 ? ' clínicas en ' : ' clínica en ') + province;

    var pinEl = pinGroup.querySelector('.pin-scale');
    var pinRect = pinEl.getBoundingClientRect();
    var wrapRect = mapOuterEl.getBoundingClientRect();
    var cx = pinRect.left + pinRect.width / 2 - wrapRect.left;
    var cy = pinRect.top - wrapRect.top;

    tipEl.style.left = cx + 'px';
    tipEl.style.top = cy + 'px';
    tipEl.style.opacity = '1';
    tipEl.style.transform = 'translate(-50%, calc(-100% - 10px))';
  }
  function hideTip() {
    tipEl.style.opacity = '0';
  }

  function setActiveProvince(province) {
    Array.prototype.forEach.call(pinsEl.querySelectorAll('.prov-group'), function (g) {
      g.classList.toggle('cd-selected', !!province && g.getAttribute('data-province') === province);
    });
  }

  function applyMapFilter(filterText) {
    var filter = normalizeText((filterText || '').trim());
    Array.prototype.forEach.call(provincesEl.querySelectorAll('.province'), function (p) {
      var name = p.getAttribute('data-province');
      var clinics = provincesMap[name] || [];
      var match = !filter || clinics.some(function (c) { return normalizeText(c.n + ' ' + c.c + ' ' + name).indexOf(filter) !== -1; });
      p.classList.toggle('dimmed', !!filter && !match);
    });
    Array.prototype.forEach.call(pinsEl.querySelectorAll('.prov-group'), function (g) {
      var name = g.getAttribute('data-province');
      var clinics = provincesMap[name] || [];
      var match = !filter || clinics.some(function (c) { return normalizeText(c.n + ' ' + c.c + ' ' + name).indexOf(filter) !== -1; });
      g.classList.toggle('dimmed', !!filter && !match);
    });
  }

  renderProvincePaths();
  renderPins();
  renderCarouselDots();
  renderCarouselCard();
  startAutoplay();

  // ── Buscador ──
  var searchInputEl = document.getElementById('cleardent-search-input');
  var searchResultsEl = document.getElementById('cleardentSearchResults');

  function clinicMatchScore(c, province, filter) {
    var nameN = normalizeText(c.n);
    var cityN = normalizeText(c.c);
    var provN = normalizeText(province);
    if (cityN === filter || nameN === filter) return 0;
    if (cityN.indexOf(filter) === 0 || nameN.indexOf(filter) === 0) return 1;
    if (cityN.indexOf(filter) !== -1 || nameN.indexOf(filter) !== -1) return 2;
    if (provN === filter) return 3;
    if (provN.indexOf(filter) === 0) return 4;
    if (provN.indexOf(filter) !== -1) return 5;
    return -1;
  }

  function findMatchingClinics(filter) {
    var matches = [];
    provinceNames.forEach(function (province) {
      provincesMap[province].forEach(function (c) {
        var score = clinicMatchScore(c, province, filter);
        if (score !== -1) matches.push({ c: c, province: province, score: score });
      });
    });
    matches.sort(function (a, b) {
      return a.score - b.score || a.c.n.localeCompare(b.c.n, 'es');
    });
    return matches;
  }

  function hideSearchResults() {
    searchResultsEl.style.display = 'none';
    searchResultsEl.innerHTML = '';
  }

  function renderSearchResults(filter) {
    var matches = findMatchingClinics(filter);
    if (matches.length === 0) {
      searchResultsEl.innerHTML = '<div class="cleardent-search-empty">¿No ves tu zona? Seguro que tenemos una clínica cerca.<br><a href="https://clear.cleardent.es/convenios/travelclub#pide-cita" target="_blank" rel="noopener">Pide cita</a> o llama al <a href="tel:+34635361303">635&nbsp;36&nbsp;13&nbsp;03</a> y te decimos cuál es.</div>';
    } else {
      var html = '';
      matches.slice(0, 8).forEach(function (m) {
        html += '<button type="button" class="cleardent-search-result" data-province="' + esc(m.province) + '">' +
          '<div class="cleardent-search-result-name">Cleardent ' + esc(m.c.n) + '</div>' +
          '<div class="cleardent-search-result-addr">' + esc(m.c.a) + ', ' + esc(m.c.c) + '</div></button>';
      });
      searchResultsEl.innerHTML = html;
      Array.prototype.forEach.call(searchResultsEl.querySelectorAll('.cleardent-search-result'), function (btn) {
        btn.addEventListener('mousedown', function (e) { e.preventDefault(); });
        btn.addEventListener('click', function () {
          var idx = provinceNames.indexOf(btn.getAttribute('data-province'));
          if (idx !== -1) goToIndex(idx, true);
          searchInputEl.value = '';
          applyMapFilter('');
          hideSearchResults();
          startAutoplay();
        });
      });
    }
    searchResultsEl.style.display = 'block';
  }

  searchInputEl.addEventListener('input', function (e) {
    var val = e.target.value;
    applyMapFilter(val);
    var filter = normalizeText(val.trim());
    if (!filter) {
      hideSearchResults();
      startAutoplay();
      return;
    }
    stopAutoplay();
    renderSearchResults(filter);
  });

  searchInputEl.addEventListener('focus', function () {
    var filter = normalizeText(searchInputEl.value.trim());
    if (filter) renderSearchResults(filter);
  });

  searchInputEl.addEventListener('blur', function () {
    window.setTimeout(hideSearchResults, 150);
  });
</script>

</body>
</html>
